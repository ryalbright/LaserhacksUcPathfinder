<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UC Transfer Tool</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <h1>UC Transfer Pathfinder</h1>

  <label for="campuses">Enter Campuses (comma-separated):</label>
  <input id="campuses" placeholder="e.g., UCLA,UCI,UCB">

  <label for="major">Select Your Major:</label>
  <select id="major">
    {% for item in majors %}
      <option value="{{ item.major_name }}">{{ item.major_name }} ({{ item.campuses }})</option>
    {% endfor %}
  </select>

  <button onclick="fetchData()">Search</button>

  <div id="results"></div>

  <h2 style="margin-top: 3rem;">Explore High ROI Majors Based on Your GPA</h2>
  <label for="roi_gpa">Enter your GPA:</label>
  <input type="number" step="0.01" id="roi_gpa">
  <button onclick="fetchROI()">Find High ROI Majors</button>

  <div id="roiResults"></div>

  <script>
    async function fetchData() {
      const campuses = document.getElementById("campuses").value;
      const major = document.getElementById("major").value;

      const res = await fetch('/predict', {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ campuses, major })
      });

      const data = await res.json();
      const results = document.getElementById("results");
      results.innerHTML = "";

      if (data.gpa.length === 0) {
        results.innerHTML += `<div class="card">No GPA data found.</div>`;
      } else {
        data.gpa.forEach(g => {
          results.innerHTML += `
            <div class="card">
              <strong>${g.campus}</strong><br>
              Major: ${g.major}<br>
              Admit GPA Range: ${g.gpa_range}<br>
              Admit Rate: ${g.admit_rate}
            </div>`;
        });
      }

      if (data.salary.length > 0) {
        results.innerHTML += `<h2>UCI Salary Data</h2>`;
        data.salary.forEach(s => {
          results.innerHTML += `
            <div class="card">
              <strong>${s.label}</strong><br>
              2 Years: ${s.y2}<br>
              5 Years: ${s.y5}<br>
              10 Years: ${s.y10}
            </div>`;
        });
      }

      if (data && data.related_clubs && data.related_clubs.length > 0) {
        results.innerHTML += `<h2>Clubs Related to Your Major</h2>`;
        results.innerHTML += `<div class="see-all-clubs"><a href="https://www.ivc.edu/clubs/list" target="_blank">See All Clubs</a></div>`;
        data.related_clubs.forEach(c => {
          const websiteLink = c.url ? `<br><a href="${c.url}" target="_blank">Visit Website</a>` : "";
          results.innerHTML += `
            <div class="card collapsible">
              <strong>${c.name}</strong>
              <div class="card-content">
                ${c.desc}${websiteLink}
              </div>
            </div>`;
        });
      }

      if (data.extra_clubs && data.extra_clubs.length > 0) {
        results.innerHTML += `<h2>Leadership, General, and Cultural Extracurriculars</h2>`;
        results.innerHTML += `<div style="margin-bottom: 1rem;"><a href="https://www.ivc.edu/clubs/list" target="_blank">See All Clubs</a></div>`;
        data.extra_clubs.forEach(c => {
          results.innerHTML += `
            <div class="card">
              <strong>${c.name}</strong><br>
              ${c.desc}
            </div>`;
        });
      }

      // Enable collapsible cards after rendering
      document.querySelectorAll('.card.collapsible').forEach(card => {
        card.addEventListener('click', () => {
          card.classList.toggle('active');
        });
      });
    }

    async function fetchROI() {
      const roi_gpa = parseFloat(document.getElementById("roi_gpa").value);
      const res = await fetch('/roi', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ gpa: roi_gpa })
      });
      const data = await res.json();
      const roiDiv = document.getElementById('roiResults');
      roiDiv.innerHTML = "";

      if (data.high_roi && data.high_roi.length > 0) {
        roiDiv.innerHTML += `<h3>Recommended High ROI Majors:</h3>`;
        data.high_roi.forEach(r => {
          roiDiv.innerHTML += `
            <div class="card">
              <strong>${r.major}</strong> at ${r.campus}<br>
              Admit GPA Range: ${r.gpa_range}<br>
              5-Year Median Salary: ${r.salary}
            </div>`;
        });
      } else {
        roiDiv.innerHTML = '<div class="card">No high ROI majors found for your GPA.</div>';
      }
    }
  </script>
</body>
</html>
